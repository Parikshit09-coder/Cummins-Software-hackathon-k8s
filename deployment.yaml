apiVersion: apps/v1
kind: Deployment
metadata:
  name: cummins-backend
  namespace: cummins
  labels:
    app: cummins-backend
    tier: backend
    linked: by-aider
    version: 1.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cummins-backend
  template:
    metadata:
      labels:
        app: cummins-backend
        tier: backend
    spec:
      containers:
      - name: cummins-backend
        image: rohitg2304/cummins-backend:421e785c418bf715463c53e5c70ee1a431705eff
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: cummins-secrets
              key: MONGO_URI
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 30
          failureThreshold: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cummins-frontend
  namespace: cummins
  labels:
    app: cummins-frontend
    tier: frontend
    version: 1.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cummins-frontend
  template:
    metadata:
      labels:
        app: cummins-frontend
        tier: frontend
    spec:
      containers:
      - name: cummins-frontend
        image: rohitg2304/cummins-frontend:421e785c418bf715463c53e5c70ee1a431705eff
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "768Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
