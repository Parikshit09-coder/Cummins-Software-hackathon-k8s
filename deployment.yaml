apiVersion: apps/v1
kind: Deployment
metadata:
  name: cummins-backend
  labels:
    app: cummins-backend
    tier: backend
    linked: by-aider
    version: 1.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cummins-backend
  template:
    metadata:
      labels:
        app: cummins-backend
        tier: backend
    spec:
      containers:
      - name: cummins-backend
        image: rohitg2304/cummins-backend:a3b1bba98a662c885fbd3746635f9479f275a94a
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: cummins-secrets
              key: MONGO_URI
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # livenessProbe:
        #   httpGet:
        #     path: /health
        #     port: 5000
        #   initialDelaySeconds: 10
        #   periodSeconds: 30
        #   failureThreshold: 5
        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 5000
        #   initialDelaySeconds: 5
        #   periodSeconds: 30
        #   failureThreshold: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cummins-frontend
  labels:
    app: cummins-frontend
    tier: frontend
    version: 1.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cummins-frontend
  template:
    metadata:
      labels:
        app: cummins-frontend
        tier: frontend
    spec:
      containers:
      - name: cummins-frontend
        image: rohitg2304/cummins-frontend:a3b1bba98a662c885fbd3746635f9479f275a94a
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
