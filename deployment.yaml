apiVersion: apps/v1
kind: Deployment
metadata:
  name: cummins-backend
  namespace: cummins
  labels:
    app: cummins-backend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cummins-backend
  template:
    metadata:
      labels:
        app: cummins-backend
        tier: backend
    spec:
      containers:
      - name: cummins-backend
        image: rohitg2304/cummins-backend:pr-3-860da64af5a844e12a22e98e7454b1138327ecb0
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: cummins-secrets
              key: MONGO_URI
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cummins-frontend
  namespace: cummins
  labels:
    app: cummins-frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cummins-frontend
  template:
    metadata:
      labels:
        app: cummins-frontend
        tier: frontend
    spec:
      containers:
      - name: cummins-frontend
        image: rohitg2304/cummins-frontend:pr-3-860da64af5a844e12a22e98e7454b1138327ecb0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
